name: Generate SSL Certificates

on:
  workflow_dispatch:
    inputs:
      employee_id:
        description: 'Employee ID'
        required: true
        default: '1'
      employee_name:
        description: 'Employee name'
        required: true
        default: 'Certificate Bot'
      api_url:
        description: 'Your ngrok URL'
        required: true
        default: 'https://abc123.ngrok.io'  # Change this to your ngrok URL

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create certs directory
        run: mkdir -p certs

      - name: Generate Private Key
        run: openssl genrsa -out certs/private.key 2048

      - name: Generate CSR
        run: |
          openssl req -new \
            -key certs/private.key \
            -out certs/request.csr \
            -subj "/C=US/ST=State/L=City/O=EmployeeApp/CN=localhost"

      - name: Generate Certificate
        run: |
          openssl x509 -req \
            -days 365 \
            -in certs/request.csr \
            -signkey certs/private.key \
            -out certs/certificate.crt

      - name: Create JSON payload
        run: |
          KEY_B64=$(base64 -w 0 certs/private.key)
          CERT_B64=$(base64 -w 0 certs/certificate.crt)
          CSR_B64=$(base64 -w 0 certs/request.csr)
          
          cat > payload.json << EOF
          {
            "key": "$KEY_B64",
            "cert": "$CERT_B64",
            "csr": "$CSR_B64",
            "cn": "localhost",
            "name": "${{ github.event.inputs.employee_name }}"
          }
          EOF

      - name: Upload certificates to API
        run: |
          API_URL="${{ github.event.inputs.api_url }}"
          EMP_ID="${{ github.event.inputs.employee_id }}"
          
          echo "Uploading to: $API_URL/api/employees/$EMP_ID/certs"
          
          # Test connection first
          echo "Testing API connectivity..."
          curl -I "$API_URL/api/employees" || echo "⚠️ API not reachable"
          
          # Upload certificates
          curl -X POST "$API_URL/api/employees/$EMP_ID/certs" \
            -H "Content-Type: application/json" \
            -d @payload.json \
            --fail \
            --verbose

      - name: Upload certificates as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: certificates
          path: certs/
