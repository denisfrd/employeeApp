name: Generate SSL Certificates

on:
  workflow_dispatch:
    inputs:
      employee_id:
        description: 'Employee ID'
        required: true
        default: '1'
      employee_name:
        description: 'Employee name'
        required: true
        default: 'Certificate Bot'

jobs:
  generate-and-upload:
    # Use self-hosted runner to access localhost
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create certs directory
        run: mkdir -p certs

      - name: Generate Private Key
        run: |
          openssl genrsa -out certs/private.key 2048
          echo "✅ Private key generated"

      - name: Generate CSR
        run: |
          openssl req -new \
            -key certs/private.key \
            -out certs/request.csr \
            -subj "/C=US/ST=State/L=City/O=EmployeeApp/CN=localhost"
          echo "✅ CSR generated"

      - name: Generate Certificate
        run: |
          openssl x509 -req \
            -days 365 \
            -in certs/request.csr \
            -signkey certs/private.key \
            -out certs/certificate.crt
          echo "✅ Certificate generated"

      - name: Create JSON payload
        run: |
          # Base64 encode files
          KEY_B64=$(base64 -w 0 certs/private.key)
          CERT_B64=$(base64 -w 0 certs/certificate.crt)
          CSR_B64=$(base64 -w 0 certs/request.csr)
          
          # Windows PowerShell alternative if base64 command not available
          # KEY_B64=[Convert]::ToBase64String([IO.File]::ReadAllBytes("certs/private.key"))
          
          cat > payload.json << EOF
          {
            "key": "$KEY_B64",
            "cert": "$CERT_B64",
            "csr": "$CSR_B64",
            "cn": "localhost",
            "name": "${{ github.event.inputs.employee_name }}"
          }
          EOF
          echo "✅ JSON payload created"

      - name: Upload certificates to local API
        run: |
          # This works because runner is on your machine
          API_URL="http://localhost:8080"
          EMP_ID="${{ github.event.inputs.employee_id }}"
          
          echo "Uploading to: $API_URL/api/employees/$EMP_ID/certs"
          
          # Try to connect with timeout and retry
          curl -X POST "$API_URL/api/employees/$EMP_ID/certs" \
            -H "Content-Type: application/json" \
            -d @payload.json \
            --connect-timeout 5 \
            --max-time 30 \
            --fail \
            --verbose
          
          echo "✅ Upload complete"

      - name: Upload certificates as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-certificates
          path: certs/
          retention-days: 30
