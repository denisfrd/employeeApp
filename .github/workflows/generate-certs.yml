name: Generate SSL Certificates

on:
  workflow_dispatch:
    inputs:
      employee_id:
        description: 'Employee ID'
        required: true
        default: '1'
      employee_name:
        description: 'Employee name'
        required: true
        default: 'Certificate Bot'
      api_url:
        description: 'Your API URL (ngrok or cloud URL)'
        required: true
        default: 'https://your-app.ngrok.io'

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create certs directory
        run: mkdir -p certs

      - name: Generate Private Key
        run: |
          openssl genrsa -out certs/private.key 2048
          echo "Private key generated"

      - name: Generate CSR
        run: |
          openssl req -new \
            -key certs/private.key \
            -out certs/request.csr \
            -subj "/C=US/ST=State/L=City/O=EmployeeApp/CN=localhost"
          echo "CSR generated"

      - name: Generate Certificate
        run: |
          openssl x509 -req \
            -days 365 \
            -in certs/request.csr \
            -signkey certs/private.key \
            -out certs/certificate.crt
          echo "Certificate generated (valid for 365 days)"

      - name: List generated files
        run: ls -la certs/

      - name: Create JSON payload
        run: |
          # Base64 encode the files
          KEY_B64=$(base64 -w 0 certs/private.key)
          CERT_B64=$(base64 -w 0 certs/certificate.crt)
          CSR_B64=$(base64 -w 0 certs/request.csr)
          
          # Create JSON file
          cat > payload.json << EOF
          {
            "key": "$KEY_B64",
            "cert": "$CERT_B64",
            "csr": "$CSR_B64",
            "cn": "localhost",
            "name": "${{ github.event.inputs.employee_name }}"
          }
          EOF
          
          echo "JSON payload created"
          echo "Payload size: $(wc -c < payload.json) bytes"

      - name: Upload certificates to API
        run: |
          API_URL="${{ github.event.inputs.api_url }}"
          EMP_ID="${{ github.event.inputs.employee_id }}"
          
          echo "Uploading to: $API_URL/api/employees/$EMP_ID/certs"
          
          # Test if API is reachable first
          echo "Testing API connectivity..."
          curl -s -o /dev/null -w "API Status: %{http_code}\n" "$API_URL/api/employees" || echo "API not reachable, but continuing"
          
          echo "Uploading certificates..."
          RESPONSE=$(curl -s -X POST "$API_URL/api/employees/$EMP_ID/certs" \
            -H "Content-Type: application/json" \
            -d @payload.json \
            --write-out "\nHTTP_STATUS:%{http_code}" \
            --connect-timeout 10 \
            --max-time 30)
          
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | sed -n '/HTTP_STATUS:/q; p')
          
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Upload successful! (HTTP $HTTP_STATUS)"
            echo "Response: $BODY"
          else
            echo "Upload returned HTTP $HTTP_STATUS"
            echo "Response: $BODY"
          fi

      - name: Save certificates as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: certificates-${{ github.run_id }}
          path: certs/
          retention-days: 30

      - name: Workflow Summary
        run: |
          echo "=================================="
          echo "WORKFLOW COMPLETE"
          echo "=================================="
          echo "Employee ID: ${{ github.event.inputs.employee_id }}"
          echo "Employee Name: ${{ github.event.inputs.employee_name }}"
          echo "API URL: ${{ github.event.inputs.api_url }}"
          echo "Certificate valid for: 365 days"
          echo ""
          echo "Files generated:"
          ls -1 certs/
          echo "=================================="
          echo ""
          echo "📥 Download certificates from the Artifacts section above"
