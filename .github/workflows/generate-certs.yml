# Simple workflow to generate SSL certificates and upload to your API
name: Generate SSL Certificates

# When to run: manually only (you click the button)
on:
  workflow_dispatch:
    inputs:
      employee_id:
        description: 'Employee ID for certificate owner'
        required: true
        default: '1'
      employee_name:
        description: 'Employee name'
        required: true
        default: 'Certificate Bot'

# What the workflow does
jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    # If your API runs on localhost, use a self-hosted runner
    # runs-on: self-hosted
    
    steps:
      # Step 1: Checkout code (needed for any files we might want to save)
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Create directory for certificates
      - name: Create certs directory
        run: mkdir -p certs

      # Step 3: Generate private key
      - name: Generate Private Key
        run: |
          openssl genrsa -out certs/private.key 2048
          echo "✅ Private key generated"

      # Step 4: Generate Certificate Signing Request (CSR)
      - name: Generate CSR
        run: |
          openssl req -new \
            -key certs/private.key \
            -out certs/request.csr \
            -subj "/C=US/ST=State/L=City/O=EmployeeApp/CN=localhost"
          echo "✅ CSR generated"

      # Step 5: Generate self-signed certificate
      - name: Generate Certificate
        run: |
          openssl x509 -req \
            -days 365 \
            -in certs/request.csr \
            -signkey certs/private.key \
            -out certs/certificate.crt
          echo "✅ Certificate generated (valid for 365 days)"

      # Step 6: Show what was generated
      - name: List generated files
        run: ls -la certs/

      # Step 7: Prepare JSON payload for API
      - name: Create JSON payload
        run: |
          # Base64 encode the files for safe transmission
          KEY_B64=$(base64 -w 0 certs/private.key)
          CERT_B64=$(base64 -w 0 certs/certificate.crt)
          CSR_B64=$(base64 -w 0 certs/request.csr)
          
          # Create JSON file
          cat > payload.json << EOF
          {
            "key": "$KEY_B64",
            "cert": "$CERT_B64",
            "csr": "$CSR_B64",
            "cn": "localhost",
            "name": "${{ github.event.inputs.employee_name }}"
          }
          EOF
          echo "✅ JSON payload created"

      # Step 8: Upload to your API
      - name: Upload certificates to API
        run: |
          # Change this URL to match where your API is running
          # For local: http://localhost:8080
          # For Docker: http://host.docker.internal:8080
          # For remote: https://your-api.com
          API_URL="http://localhost:8080"
          EMP_ID="${{ github.event.inputs.employee_id }}"
          
          echo "Uploading to: $API_URL/api/employees/$EMP_ID/certs"
          
          # Make the API call
          RESPONSE=$(curl -s -X POST "$API_URL/api/employees/$EMP_ID/certs" \
            -H "Content-Type: application/json" \
            -d @payload.json)
          
          echo "✅ API Response:"
          echo "$RESPONSE" | jq . 2>/dev/null || echo "$RESPONSE"

      # Step 9: Save certificates as artifacts (backup)
      - name: Upload certificates as artifacts
        uses: actions/upload-artifact@v3
        with:
          name: generated-certificates
          path: certs/
          retention-days: 30  # Keep for 30 days

      # Step 10: Summary
      - name: Workflow Summary
        run: |
          echo "=================================="
          echo "✅ WORKFLOW COMPLETE"
          echo "=================================="
          echo "Employee ID: ${{ github.event.inputs.employee_id }}"
          echo "Employee Name: ${{ github.event.inputs.employee_name }}"
          echo "Certificate valid for: 365 days"
          echo ""
          echo "Files generated:"
          ls -1 certs/
          echo "=================================="
